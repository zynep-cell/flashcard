<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Odak | KPSS Flashcard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1c1c1c;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
            --accent: #4a4a4a;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body {
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 2rem 1rem; line-height: 1.6;
        }

        header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 600px; position: relative; }
        h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 2px; }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }

        /* Butonlar ve Girdiler */
        input[type="text"], textarea {
            width: 100%; background-color: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 1rem; border-radius: 8px; outline: none; transition: border var(--transition);
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--text-muted); }
        textarea { height: 150px; resize: vertical; }

        button {
            background-color: var(--text-main); color: var(--bg-color); border: none;
            padding: 0.8rem 1.5rem; font-size: 1rem; border-radius: 4px; cursor: pointer; transition: opacity var(--transition);
        }
        button:hover { opacity: 0.9; }
        .btn-outline { background-color: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-outline:hover { background-color: var(--card-bg); }
        .btn-danger { background-color: transparent; color: #ff5555; border: 1px dashed #ff5555; }
        .btn-danger:hover { background-color: rgba(255, 85, 85, 0.1); }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.85rem; }

        /* --- Ana Sayfa Ekranı (Dashboard) --- */
        #dashboard-view { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 2rem; }
        
        .create-section, .library-section {
            background-color: #141414; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 1rem;
        }
        .section-title { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }

        .file-upload-wrapper { position: relative; width: 100%; }
        .file-upload-label {
            display: flex; align-items: center; justify-content: center; width: 100%; padding: 1rem;
            border: 1px dashed var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-muted);
        }
        .file-upload-label:hover { border-color: var(--text-main); color: var(--text-main); }
        input[type="file"] { display: none; }

        .deck-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background-color: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color);
        }
        .deck-info { display: flex; flex-direction: column; }
        .deck-name { font-weight: 500; font-size: 1.1rem; }
        .deck-count { font-size: 0.8rem; color: var(--text-muted); }
        .deck-actions { display: flex; gap: 0.5rem; }

        #restore-toast {
            display: none; justify-content: space-between; align-items: center;
            padding: 1rem; background-color: #2a2a2a; border-radius: 8px; margin-top: 1rem; border: 1px solid #ffaa00;
        }

        /* --- Çalışma Ekranı (Study View) --- */
        #study-view { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; gap: 1.5rem; position: relative; }
        
        .study-header { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        #study-deck-title { font-size: 1.2rem; color: var(--text-main); }
        #progress-text { color: var(--text-muted); font-size: 0.9rem; }

        .card-container { width: 100%; height: 380px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; padding: 2rem;
            background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-y: auto;
        }
        .card-front { align-items: center; text-align: center; font-size: 1.2rem; font-weight: 500; }
        .card-back { transform: rotateY(180deg); font-size: 0.95rem; align-items: flex-start; justify-content: flex-start; }
        
        .controls { display: flex; gap: 0.5rem; width: 100%; }
        .controls button { flex: 1; }
        .btn-icon { flex: 0.3 !important; font-size: 1.2rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <h1>SHIBUMI ODAK</h1>
        <div class="subtitle">Minimalist Bilgi Kartı Sistemi</div>
    </header>

    <div id="dashboard-view">
        <div class="library-section">
            <div class="section-title">Kayıtlı Desteleriniz</div>
            <div id="deck-list">
                </div>
            <div id="restore-toast">
                <span>Deste silindi.</span>
                <button class="btn-outline btn-small" onclick="restoreDeck()">Geri Yükle</button>
            </div>
        </div>

        <div class="create-section">
            <div class="section-title">Yeni Deste Oluştur</div>
            <input type="text" id="deck-name-input" placeholder="Deste İsmi (örn: Tarih - İnkılap)" />
            
            <div class="file-upload-wrapper">
                <label for="pdf-upload" class="file-upload-label" id="pdf-label">
                    + PDF Yükle (Otomatik Ayrıştır)
                </label>
                <input type="file" id="pdf-upload" accept="application/pdf" />
            </div>

            <textarea id="source-text" placeholder="Veya metni doğrudan buraya yapıştırın..."></textarea>
            
            <button onclick="createDeck()">Desteyi Oluştur ve Kaydet</button>
        </div>
    </div>

    <div id="study-view">
        <div class="study-header">
            <button class="btn-outline btn-small" onclick="goHome()">← Ana Sayfa</button>
            <div id="study-deck-title">Deste Adı</div>
        </div>
        
        <div id="progress-text">Kart: 0 / 0</div>
        
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="flashcard">
                <div class="card-face card-front" id="card-front-content"></div>
                <div class="card-face card-back" id="card-back-content"></div>
            </div>
        </div>

        <div class="controls" id="study-controls">
            <button class="btn-outline btn-icon" title="Son Öğrenileni Geri Al" onclick="undoCard()">↺</button>
            <button class="btn-outline" onclick="repeatCard()">Tekrar Et</button>
            <button onclick="learnedCard()">Öğrendim</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let decks = [];
        let deletedDeckCache = null; // Geri yükleme için önbellek
        
        // Çalışma durumu değişkenleri
        let currentDeckId = null;
        let studyQueue = [];
        let learnedStack = []; // Geri alma (Undo) işlemi için öğrenilenleri tutar
        let currentIndex = 0;

        // Başlangıçta Desteleri Yükle
        window.onload = () => {
            const savedDecks = localStorage.getItem('shibumi_decks');
            if (savedDecks) {
                decks = JSON.parse(savedDecks);
            }
            renderDashboard();
        };

        function saveToLocal() {
            localStorage.setItem('shibumi_decks', JSON.stringify(decks));
            renderDashboard();
        }

        // PDF Okuma İşlemi
        document.getElementById('pdf-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const label = document.getElementById('pdf-label');
            label.innerText = "PDF Okunuyor...";

            // Eğer deste ismi boşsa dosya adını koy
            const nameInput = document.getElementById('deck-name-input');
            if(!nameInput.value) nameInput.value = file.name.replace('.pdf', '');

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                let lastY = -1;
                textContent.items.forEach(item => {
                    if (lastY !== item.transform[5] && lastY !== -1) fullText += '\n';
                    fullText += item.str + ' ';
                    lastY = item.transform[5];
                });
                fullText += "\n\n"; 
            }

            fullText = fullText.replace(/([a-zğüşöçı])-\n([a-zğüşöçı])/g, '$1$2'); 
            document.getElementById('source-text').value = fullText;
            label.innerText = "PDF Yüklendi! Değişiklik yapabilir veya oluşturabilirsiniz.";
        });

        // GELİŞMİŞ AYRIŞTIRICI (Regex Kanama Çözümü)
        function generateCardsFromText(text) {
            const cards = [];
            
            // 1. ADIM: Soru başlangıçlarını tespit eden agresif kural.
            // (1., 1), Soru 1:, Soru 1 - vb. formatları kesin olarak ayırır)
            // Bu sayede "cevap içine sonraki soru sızması" önlenir.
            let chunks = text.split(/\n(?=\s*\d+[\.\)]\s|\s*Soru\s*\d+\s*:?\s*)/i);
            
            if (chunks.length <= 1) {
                // Eğer metinde numaralandırma yoksa, çift paragrafa göre böl
                chunks = text.split(/\n\s*\n/);
            }

            chunks.forEach(chunk => {
                let cleanChunk = chunk.trim();
                if (cleanChunk.length < 5) return;

                let question = "";
                let answer = "";

                const qIndex = cleanChunk.indexOf('?');
                const cIndex = cleanChunk.indexOf(':');

                if (qIndex !== -1) {
                    question = cleanChunk.substring(0, qIndex + 1).trim();
                    answer = cleanChunk.substring(qIndex + 1).trim();
                } else if (cIndex !== -1 && cIndex < 100) {
                    question = cleanChunk.substring(0, cIndex + 1).trim();
                    answer = cleanChunk.substring(cIndex + 1).trim();
                } else {
                    const lines = cleanChunk.split('\n');
                    question = lines[0].trim();
                    answer = lines.slice(1).join('\n').trim();
                }

                if (question && answer) {
                    const formattedAnswer = "• " + answer.replace(/\n/g, '<br> • ');
                    cards.push({ q: question, a: formattedAnswer });
                } else if (question && !answer) {
                    cards.push({ q: question, a: "Bu sorunun cevabı metinden çıkarılamadı veya yoruma dayalı." });
                }
            });

            return cards;
        }

        function createDeck() {
            const name = document.getElementById('deck-name-input').value.trim() || `Yeni Deste ${decks.length + 1}`;
            const text = document.getElementById('source-text').value;
            const newCards = generateCardsFromText(text);

            if (newCards.length === 0) {
                alert("Metin anlaşılamadı. Lütfen içeriği kontrol edin.");
                return;
            }

            const newDeck = {
                id: Date.now().toString(),
                name: name,
                cards: newCards,
                total: newCards.length
            };

            decks.push(newDeck);
            saveToLocal();
            
            // Alanları Temizle
            document.getElementById('deck-name-input').value = '';
            document.getElementById('source-text').value = '';
            document.getElementById('pdf-label').innerText = "+ PDF Yükle (Otomatik Ayrıştır)";
        }

        function renderDashboard() {
            const list = document.getElementById('deck-list');
            list.innerHTML = '';

            if (decks.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">Henüz kayıtlı desteniz yok.</p>';
                return;
            }

            decks.forEach(deck => {
                const item = document.createElement('div');
                item.className = 'deck-item';
                item.innerHTML = `
                    <div class="deck-info">
                        <div class="deck-name">${deck.name}</div>
                        <div class="deck-count">${deck.cards.length} Kart (Kalan)</div>
                    </div>
                    <div class="deck-actions">
                        <button class="btn-outline btn-small" onclick="startStudy('${deck.id}')">Çalış</button>
                        <button class="btn-danger btn-small" onclick="deleteDeck('${deck.id}')">Sil</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function deleteDeck(id) {
            const index = decks.findIndex(d => d.id === id);
            if (index !== -1) {
                deletedDeckCache = decks[index]; // Silineni önbelleğe al
                decks.splice(index, 1);
                saveToLocal();
                
                // Toast mesajını göster
                const toast = document.getElementById('restore-toast');
                toast.style.display = 'flex';
                setTimeout(() => { toast.style.display = 'none'; deletedDeckCache = null; }, 10000); // 10 saniye sonra gizle
            }
        }

        function restoreDeck() {
            if (deletedDeckCache) {
                decks.push(deletedDeckCache);
                deletedDeckCache = null;
                document.getElementById('restore-toast').style.display = 'none';
                saveToLocal();
            }
        }

        // --- ÇALIŞMA MANTIĞI ---

        function startStudy(id) {
            const deck = decks.find(d => d.id === id);
            if (!deck || deck.cards.length === 0) {
                alert("Bu destede çalışılacak kart kalmadı. Silip yeniden yükleyebilirsiniz.");
                return;
            }

            currentDeckId = id;
            studyQueue = [...deck.cards]; // Kartların kopyasını al
            learnedStack = []; // Undo yığınını sıfırla
            currentIndex = 0;

            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'flex';
            document.getElementById('study-deck-title').innerText = deck.name;
            
            renderCard();
        }

        function goHome() {
            document.getElementById('study-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'flex';
            
            // Eğer destede çalışılırken yarıda kesildiyse, mevcut durumu kaydet
            if (currentDeckId) {
                const deckIndex = decks.findIndex(d => d.id === currentDeckId);
                if (deckIndex !== -1) {
                    decks[deckIndex].cards = [...studyQueue];
                    saveToLocal();
                }
            }
            currentDeckId = null;
        }

        function renderCard() {
            if (studyQueue.length === 0) {
                document.getElementById('card-front-content').innerHTML = "Harika!";
                document.getElementById('card-back-content').innerHTML = "Bu desteyi tamamen öğrendin.";
                document.getElementById('progress-text').innerText = "Görev Tamamlandı";
                document.getElementById('study-controls').style.display = 'none';
                
                // Desteyi güncelle (sıfırlandı)
                const deckIndex = decks.findIndex(d => d.id === currentDeckId);
                if(deckIndex !== -1) decks[deckIndex].cards = [];
                return;
            }

            document.getElementById('study-controls').style.display = 'flex';
            const card = document.getElementById('flashcard');
            card.classList.remove('is-flipped'); 

            setTimeout(() => {
                document.getElementById('card-front-content').innerHTML = studyQueue[currentIndex].q;
                document.getElementById('card-back-content').innerHTML = studyQueue[currentIndex].a;
                document.getElementById('progress-text').innerText = `Kart: ${currentIndex + 1} / ${studyQueue.length}`;
            }, 150);
        }

        function flipCard() {
            if (studyQueue.length > 0) document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function learnedCard() {
            if (studyQueue.length === 0) return;
            
            // Kartı öğrenilenler yığınına at (Undo için sakla)
            const learned = studyQueue.splice(currentIndex, 1)[0];
            learnedStack.push(learned);

            if (currentIndex >= studyQueue.length) currentIndex = 0;
            renderCard();
        }

        function undoCard() {
            if (learnedStack.length === 0) return;
            
            // Son öğrenileni geri al ve çalışma kuyruğunun başına ekle
            const restoredCard = learnedStack.pop();
            studyQueue.splice(currentIndex, 0, restoredCard);
            
            renderCard();
        }

        function repeatCard() {
            if (studyQueue.length === 0) return;
            currentIndex = (currentIndex + 1) % studyQueue.length;
            renderCard();
        }
    </script>
</body>
</html>
