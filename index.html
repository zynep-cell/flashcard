<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shibumi Odak | KPSS Flashcard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1c1c1c;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
            --accent: #6b6b6b;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body {
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 2rem 1rem; line-height: 1.6;
        }

        header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 600px; position: relative; }
        h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 2px; }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }

        input[type="text"], textarea {
            width: 100%; background-color: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 1rem; border-radius: 8px; outline: none; transition: border var(--transition);
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--text-muted); }
        textarea { height: 150px; resize: vertical; }

        button {
            background-color: var(--text-main); color: var(--bg-color); border: none;
            padding: 0.8rem 1.5rem; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: all var(--transition);
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-outline { background-color: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-outline:hover { background-color: var(--card-bg); }
        .btn-danger { background-color: transparent; color: #ff5555; border: 1px dashed #ff5555; }
        .btn-danger:hover { background-color: rgba(255, 85, 85, 0.1); }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.85rem; }

        .btn-home {
            background-color: #2a2a2a; color: white; border: 1px solid #444;
            display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px;
        }
        .btn-home:hover { background-color: #333; border-color: #555; }

        /* GÜNLÜK İLERLEME BUTONU VE MODALI */
        #daily-banner {
            width: 100%; max-width: 600px; background-color: #1a1a1a; border: 1px solid var(--border-color);
            padding: 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem; cursor: pointer;
            transition: background var(--transition); display: flex; justify-content: space-between; align-items: center;
        }
        #daily-banner:hover { background-color: #252525; }
        .daily-text { font-weight: 500; }
        .daily-icon { color: var(--text-muted); font-size: 0.9rem; }

        #daily-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
            justify-content: center; align-items: center; padding: 1rem; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg-color); width: 100%; max-width: 600px; max-height: 80vh; border-radius: 12px;
            border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .learned-item { background: var(--card-bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--border-color); }
        .learned-q { font-weight: bold; margin-bottom: 0.5rem; color: var(--text-main); }
        .learned-a { color: var(--text-muted); font-size: 0.95rem; }

        #dashboard-view { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 2rem; }
        
        .create-section, .library-section {
            background-color: #141414; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 1rem;
        }
        .section-title { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center;}

        .file-upload-wrapper { position: relative; width: 100%; }
        .file-upload-label {
            display: flex; align-items: center; justify-content: center; width: 100%; padding: 1rem;
            border: 1px dashed var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-muted);
        }
        .file-upload-label:hover { border-color: var(--text-main); color: var(--text-main); }
        input[type="file"] { display: none; }

        .deck-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background-color: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color);
        }
        .deck-info { display: flex; flex-direction: column; gap: 0.4rem; }
        .deck-name { font-weight: 500; font-size: 1.1rem; }
        .deck-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.75rem; color: var(--text-muted); }
        .deck-badge { background-color: #222; padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid #333; }
        .deck-actions { display: flex; gap: 0.5rem; }

        #study-view { display: none; width: 100%; max-width: 550px; flex-direction: column; align-items: center; gap: 1.5rem; position: relative; }
        
        .study-header { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 1rem; }
        #study-deck-title { font-size: 1.1rem; color: var(--text-muted); }
        #progress-text { color: var(--text-muted); font-size: 0.9rem; margin-top: -10px; }

        .card-container { width: 100%; height: 400px; perspective: 1000px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; padding: 2.5rem;
            background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-front { align-items: center; text-align: center; font-size: 1.25rem; font-weight: 500; }
        .card-back { transform: rotateY(180deg); font-size: 1rem; align-items: flex-start; justify-content: flex-start; }
        
        .controls { display: flex; gap: 0.5rem; width: 100%; }
        .controls button { flex: 1; padding: 1rem; font-size: 1.1rem;}
        .btn-icon { flex: 0.3 !important; font-size: 1.5rem; padding: 0.5rem;}

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <h1>SHIBUMI ODAK</h1>
        <div class="subtitle">Minimalist Flashcard Sistemi</div>
    </header>

    <!-- GÜNLÜK İLERLEME BUTONU -->
    <div id="daily-banner" onclick="openDailyModal()">
        <span class="daily-text">🌙 Bugün <span id="daily-count">0</span> kart öğrendin.</span>
        <span class="daily-icon">Görüntüle →</span>
    </div>

    <!-- GÜNLÜK ÖĞRENİLENLER MODALI -->
    <div id="daily-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bugün Öğrenilenler</h2>
                <button class="btn-outline btn-small" onclick="closeDailyModal()">Kapat</button>
            </div>
            <div class="modal-body" id="daily-list">
                <!-- Öğrenilen kartlar buraya gelecek -->
            </div>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="library-section">
            <div class="section-title">Kayıtlı Desteleriniz</div>
            <div id="deck-list"></div>
        </div>

        <div class="create-section">
            <div class="section-title">Yeni Deste Oluştur</div>
            <input type="text" id="deck-name-input" placeholder="Deste İsmi (örn: KPSS Tarih Deneme 1)" />
            
            <div class="file-upload-wrapper">
                <label for="pdf-upload" class="file-upload-label" id="pdf-label">
                    + PDF Yükle (Otomatik Soru Avcısı)
                </label>
                <input type="file" id="pdf-upload" accept="application/pdf" />
            </div>

            <textarea id="source-text" placeholder="Veya metni doğrudan buraya yapıştırın..."></textarea>
            <button onclick="createDeck()">Desteyi Oluştur ve Kaydet</button>
        </div>
    </div>

    <div id="study-view">
        <div class="study-header">
            <button class="btn-home" onclick="goHome()">🏠 Ana Sayfa</button>
            <div id="study-deck-title">Deste Adı</div>
        </div>
        
        <div id="progress-text">Kart: 0 / 0</div>
        
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="flashcard">
                <div class="card-face card-front" id="card-front-content"></div>
                <div class="card-face card-back" id="card-back-content"></div>
            </div>
        </div>

        <div class="controls" id="study-controls">
            <button class="btn-outline btn-icon" title="Öğrenileni Geri Al" onclick="undoCard()">↺</button>
            <button class="btn-outline" onclick="repeatCard()">Geç / Tekrar Et</button>
            <button onclick="learnedCard()">Öğrendim</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let decks = [];
        let dailyProgress = { date: new Date().toLocaleDateString('tr-TR'), cards: [] };
        
        let currentDeckId = null;
        let studyQueue = [];
        let learnedStack = [];
        let currentIndex = 0;

        window.onload = () => {
            // Desteleri Yükle ve Eski Verileri Onar
            const savedDecks = localStorage.getItem('shibumi_decks');
            if (savedDecks) {
                decks = JSON.parse(savedDecks);
                decks.forEach(d => {
                    if(!d.date) d.date = new Date().toLocaleDateString('tr-TR');
                    if(!d.lastStudied) d.lastStudied = "Henüz çalışılmadı";
                    if(!d.originalCards) {
                        d.originalCards = [...d.cards]; 
                        d.remainingCards = [...d.cards];
                    }
                });
            }

            // Günlük İlerlemeyi Yükle (Ertesi gün sıfırlanma mantığı)
            const savedDaily = localStorage.getItem('shibumi_daily');
            if (savedDaily) {
                const parsedDaily = JSON.parse(savedDaily);
                // Eğer gün değişmişse eski kartları siliyoruz, bugüne temiz başlıyoruz
                if (parsedDaily.date === dailyProgress.date) {
                    dailyProgress = parsedDaily;
                } else {
                    localStorage.removeItem('shibumi_daily');
                }
            }
            
            updateDailyUI();
            renderDashboard();
        };

        function saveToLocal() {
            localStorage.setItem('shibumi_decks', JSON.stringify(decks));
            renderDashboard();
        }

        function saveDailyProgress() {
            localStorage.setItem('shibumi_daily', JSON.stringify(dailyProgress));
            updateDailyUI();
        }

        function updateDailyUI() {
            document.getElementById('daily-count').innerText = dailyProgress.cards.length;
        }

        // Günlük Öğrenilenler Modalı Kontrolleri
        function openDailyModal() {
            const list = document.getElementById('daily-list');
            list.innerHTML = '';
            
            if (dailyProgress.cards.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Bugün henüz kart öğrenmedin.</p>';
            } else {
                // En son öğrenilen en üstte görünsün diye ters çevirerek (reverse) ekliyoruz
                [...dailyProgress.cards].reverse().forEach(card => {
                    list.innerHTML += `
                        <div class="learned-item">
                            <div class="learned-q">${card.q}</div>
                            <div class="learned-a">${card.a}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('daily-modal').style.display = 'flex';
        }

        function closeDailyModal() {
            document.getElementById('daily-modal').style.display = 'none';
        }

        // PDF Yükleme
        document.getElementById('pdf-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const label = document.getElementById('pdf-label');
            label.innerText = "PDF Okunuyor, lütfen bekleyin...";
            
            const nameInput = document.getElementById('deck-name-input');
            if(!nameInput.value) nameInput.value = file.name.replace('.pdf', '');

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                let lastY = -1;
                textContent.items.forEach(item => {
                    if (lastY !== item.transform[5] && lastY !== -1) fullText += '\n';
                    fullText += item.str;
                    lastY = item.transform[5];
                });
                fullText += "\n"; 
            }

            fullText = fullText.replace(/([a-zğüşöçı])-\n([a-zğüşöçı])/gi, '$1$2');
            fullText = fullText.replace(/([^\.\?\!\:\;\n])\n(?=[a-zğüşöçı])/gi, '$1 ');

            document.getElementById('source-text').value = fullText;
            label.innerText = "PDF Yüklendi! (Gerekirse aşağıdaki metni düzenleyebilirsiniz)";
        });

        function generateCardsFromText(text) {
            const cards = [];
            let splitText = text.replace(/(^|\n|[\.\?\!]\s+)(\d+[\.\)-]\s+|Soru\s*\d+\s*[:\-]?\s*)/gi, '$1|||$2');
            let chunks = splitText.split('|||');

            if (chunks.length <= 2) chunks = text.split(/\n\s*\n/);

            chunks.forEach(chunk => {
                let cleanChunk = chunk.trim();
                if (cleanChunk.length < 5) return; 

                let question = "";
                let answer = "";
                const qIndex = cleanChunk.indexOf('?');
                const cIndex = cleanChunk.indexOf(':');

                if (qIndex !== -1) {
                    question = cleanChunk.substring(0, qIndex + 1).trim();
                    answer = cleanChunk.substring(qIndex + 1).trim();
                } else if (cIndex !== -1 && cIndex < 100) {
                    question = cleanChunk.substring(0, cIndex + 1).trim();
                    answer = cleanChunk.substring(cIndex + 1).trim();
                } else {
                    const lines = cleanChunk.split('\n');
                    if(lines.length > 1) {
                        question = lines[0].trim();
                        answer = lines.slice(1).join('\n').trim();
                    } else {
                        question = cleanChunk;
                        answer = "Ayrıntılı cevap/maddeler bulunamadı.";
                    }
                }

                if (question) {
                    let formattedAnswer = answer;
                    if(answer && answer !== "Ayrıntılı cevap/maddeler bulunamadı.") {
                        formattedAnswer = "• " + answer.replace(/\n/g, '<br><br> • ');
                    }
                    cards.push({ q: question, a: formattedAnswer });
                }
            });
            return cards;
        }

        function createDeck() {
            const text = document.getElementById('source-text').value;
            if (!text.trim()) return alert("Lütfen metin girin veya PDF yükleyin.");

            const newCards = generateCardsFromText(text);
            if (newCards.length === 0) return alert("Soru algılanamadı.");

            const name = document.getElementById('deck-name-input').value.trim() || `Deste ${decks.length + 1}`;
            const currentDate = new Date().toLocaleDateString('tr-TR');

            decks.push({
                id: Date.now().toString(),
                name: name,
                date: currentDate,
                lastStudied: "Henüz çalışılmadı",
                originalCards: JSON.parse(JSON.stringify(newCards)), 
                remainingCards: JSON.parse(JSON.stringify(newCards)), 
                total: newCards.length
            });

            saveToLocal();
            document.getElementById('deck-name-input').value = '';
            document.getElementById('source-text').value = '';
            document.getElementById('pdf-label').innerText = "+ PDF Yükle (Otomatik Soru Avcısı)";
            
            alert(`${newCards.length} adet soru başarıyla ayrıştırıldı ve desteye eklendi!`);
        }

        function renderDashboard() {
            const list = document.getElementById('deck-list');
            list.innerHTML = '';
            if (decks.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">Henüz desteniz yok.</p>';
                return;
            }
            
            decks.forEach(deck => {
                const isFinished = deck.remainingCards.length === 0;
                const btnText = isFinished ? 'Yeniden Çalış' : 'Devam Et';
                
                const item = document.createElement('div');
                item.className = 'deck-item';
                item.innerHTML = `
                    <div class="deck-info">
                        <div class="deck-name">${deck.name}</div>
                        <div class="deck-meta">
                            <span class="deck-badge">➕ ${deck.date}</span>
                            <span class="deck-badge">👁️ Son: ${deck.lastStudied}</span>
                            <span style="margin-left:5px;">${deck.remainingCards.length} / ${deck.total} Kart Kaldı</span>
                        </div>
                    </div>
                    <div class="deck-actions">
                        <button class="btn-small" onclick="startStudy('${deck.id}')" style="${isFinished ? 'background-color: var(--text-main); color: var(--bg-color);' : ''}">${btnText}</button>
                        <button class="btn-danger btn-small" onclick="deleteDeck('${deck.id}')">Sil</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function deleteDeck(id) {
            if(confirm("Bu desteyi silmek istediğinize emin misiniz?")) {
                decks = decks.filter(d => d.id !== id);
                saveToLocal();
            }
        }

        function startStudy(id) {
            const deck = decks.find(d => d.id === id);
            
            // YENİDEN ÇALIŞ BUG'I ÇÖZÜMÜ: Deep Copy (Derin Kopyalama) ile referans sorununu bitiriyoruz.
            if (!deck.remainingCards || deck.remainingCards.length === 0) {
                deck.remainingCards = JSON.parse(JSON.stringify(deck.originalCards));
            }

            currentDeckId = id;
            studyQueue = [...deck.remainingCards]; 
            learnedStack = []; 
            currentIndex = 0;

            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('daily-banner').style.display = 'none';
            document.getElementById('study-view').style.display = 'flex';
            document.getElementById('study-deck-title').innerText = deck.name;
            
            renderCard();
        }

        function goHome() {
            document.getElementById('study-view').style.display = 'none';
            document.getElementById('daily-banner').style.display = 'flex';
            document.getElementById('dashboard-view').style.display = 'flex';
            
            if (currentDeckId) {
                const deckIndex = decks.findIndex(d => d.id === currentDeckId);
                if (deckIndex !== -1) {
                    // Çalışma bittiğinde veya çıkıldığında "Son Çalışma" tarihini güncelle
                    decks[deckIndex].lastStudied = new Date().toLocaleDateString('tr-TR');
                    decks[deckIndex].remainingCards = [...studyQueue];
                    saveToLocal();
                }
            }
            currentDeckId = null;
        }

        function renderCard() {
            if (studyQueue.length === 0) {
                document.getElementById('card-front-content').innerHTML = "Tebrikler!";
                document.getElementById('card-back-content').innerHTML = "Bu çalışma seansını tamamladın.<br><br>Ana sayfadan dilediğin zaman 'Yeniden Çalış' butonuna tıklayarak desteyi sıfırlayabilirsin.";
                document.getElementById('progress-text').innerText = "Çalışma Bitti";
                document.getElementById('study-controls').style.display = 'none';
                
                const deckIndex = decks.findIndex(d => d.id === currentDeckId);
                if(deckIndex !== -1) {
                    decks[deckIndex].lastStudied = new Date().toLocaleDateString('tr-TR');
                    decks[deckIndex].remainingCards = [];
                    saveToLocal();
                }
                return;
            }

            document.getElementById('study-controls').style.display = 'flex';
            const card = document.getElementById('flashcard');
            card.classList.remove('is-flipped'); 

            setTimeout(() => {
                document.getElementById('card-front-content').innerHTML = studyQueue[currentIndex].q;
                document.getElementById('card-back-content').innerHTML = studyQueue[currentIndex].a;
                document.getElementById('progress-text').innerText = `Kart: ${currentIndex + 1} / ${studyQueue.length}`;
            }, 200);
        }

        function flipCard() {
            if (studyQueue.length > 0) document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function learnedCard() {
            if (studyQueue.length === 0) return;
            const learned = studyQueue.splice(currentIndex, 1)[0];
            
            // Kartı hem Geri Al yığınına hem de Günlük Öğrenilenler listesine ekle
            learnedStack.push(learned);
            dailyProgress.cards.push(learned);
            saveDailyProgress();

            if (currentIndex >= studyQueue.length) currentIndex = 0;
            renderCard();
        }

        function undoCard() {
            if (learnedStack.length === 0) return alert("Geri alınacak kart yok.");
            const restoredCard = learnedStack.pop();
            
            // Eğer kartı geri alırsak, Günlük İlerleme listesinden de (en sondakini) çıkarmalıyız
            dailyProgress.cards.pop();
            saveDailyProgress();

            studyQueue.splice(currentIndex, 0, restoredCard);
            renderCard();
        }

        function repeatCard() {
            if (studyQueue.length === 0) return;
            currentIndex = (currentIndex + 1) % studyQueue.length;
            renderCard();
        }
    </script>
</body>
</html>
